<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Just The Tip</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">

    <meta name="theme-color" content="#c0c0c0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Just The Tip">

    <link rel="icon" href="icons/icon-192.png">
</head>


<body>

<div class="window">


    <header class="titlebar">

        <span>Just The Tip</span>

        <button id="settingsButton">
            ⚙
        </button>

    </header>



    <main>


        <label for="billAmount">
            Bill Amount
        </label>


        <div class="moneyInput">

            <span>$</span>

            <input
                id="billAmount"
                type="number"
                inputmode="decimal"
                min="0"
                step="0.01"
                placeholder="0.00"
                autocomplete="off">

        </div>




        <div class="wheelSection">


            <label>
                Tip Percentage
            </label>


            <div id="percentWheel" class="tipWheel">
                <!-- Generated by JavaScript -->
            </div>



            <label>
                Tip Amount
            </label>


            <div id="dollarWheel" class="tipWheel">
                <!-- Generated by JavaScript -->
            </div>


        </div>




        <div class="results">


            <div class="resultRow">

                <span>
                    Tip
                </span>

                <span id="tipValue">
                    $0.00
                </span>

            </div>



            <div class="resultRow total">

                <span>
                    Total
                </span>

                <span id="totalValue">
                    $0.00
                </span>

            </div>


        </div>


    </main>


</div>





<dialog id="settingsDialog">


    <form method="dialog">


        <h2>
            Preferences
        </h2>



        <label for="defaultTip">
            Default Tip
        </label>



        <select id="defaultTip">
            <!-- Filled by JavaScript -->
        </select>




        <menu>

            <button value="cancel">
                Cancel
            </button>


            <button id="saveSettings" value="default">
                OK
            </button>

        </menu>


    </form>


</dialog>





<script src="script.js"></script>


<script>

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("sw.js");

}

</script>


</body>
</html>
